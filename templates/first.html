<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Ayurvedic Recommendation System</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
        }

        body {
            background: linear-gradient(rgba(255, 255, 255, 0.7), rgba(255, 255, 255, 0.7)), 
                        url('https://i.pinimg.com/webp/1200x/b9/9c/23/b99c237504dd5ae691d5587f30e3657a.webp');
            background-size: cover;
            background-position: center;
            background-attachment: fixed;
            height: 100vh;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            overflow: hidden;
        }

        .hero-section {
            text-align: center;
            z-index: 1;
        }

        .brand-circle {
            background: rgba(255, 255, 255, 0.95);
            width: 350px;
            height: 350px;
            border-radius: 50%;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            box-shadow: 0 15px 35px rgba(0,0,0,0.1);
            border: 1px solid rgba(255,255,255,0.3);
            transition: transform 0.3s ease;
        }

        .brand-circle:hover {
            transform: scale(1.02);
        }

        .welcome-text {
            color: #555;
            font-size: 1.2rem;
            letter-spacing: 2px;
            text-transform: uppercase;
            margin-bottom: 10px;
        }

        .project-name {
            color: #008B8B; /* Dark Turquoise */
            font-size: 4rem;
            font-weight: 700;
            margin: 5px 0;
            line-height: 1;
            letter-spacing: -1px;
        }

        .tagline {
            color: #666;
            font-style: italic;
            margin-top: 15px;
            font-size: 0.9rem;
        }

        .action-panel {
            position: fixed;
            bottom: 0;
            width: 100%;
            max-width: 700px; 
            background: #ffffff;
            padding: 40px 60px;
            border-radius: 30px 30px 0 0;
            box-shadow: 0 -10px 40px rgba(0,0,0,0.1);
            text-align: center;
        }

        .btn {
            display: block;
            width: 100%;
            padding: 18px;
            font-size: 1.1rem;
            font-weight: 600;
            border-radius: 12px;
            cursor: pointer;
            transition: all 0.3s ease;
            text-decoration: none;
        }

        .btn-main {
            background-color: #008B8B; /* Changed to Turquoise */
            color: white;
            border: none;
            margin-bottom: 20px;
        }

        .btn-main:hover {
            background-color: #006b6b; /* Darker Turquoise for hover */
            box-shadow: 0 5px 15px rgba(0, 139, 139, 0.3);
        }

        .btn-outline {
            background: transparent;
            color: #555;
            border: 1px solid #ddd;
        }

        .btn-outline:hover {
            background: #f9f9f9;
            color: #008B8B; /* Changed to Turquoise */
            border-color: #008B8B; /* Changed to Turquoise */
        }

    </style>
</head>
<body>
     
        
    <div class="hero-section">
        <div class="brand-circle">
            <p class="welcome-text">Discover Your</p>
            <h1 class="project-name">VedaPath</h1> 
            <p class="tagline">Personalized Ayurvedic Wellness</p>
        </div>
    </div>

    <div class="action-panel">
        <button class="btn btn-main">Get Started / Sign In</button>
        <button class="btn btn-outline">Explore as Guest</button>
    </div>

</body>
</html>
